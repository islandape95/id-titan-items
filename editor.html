<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Tree — Editor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar-title">⬡ Item Tree</span>
    <div class="version-picker" id="versionPicker"></div>
    <div class="topbar-spacer"></div>
    <nav class="topbar-nav">
      <a class="nav-btn" href="index.html">Visualizer</a>
      <a class="nav-btn active" href="editor.html">Editor</a>
      <a class="nav-btn" href="changelog.html">Changelog</a>
      <a class="nav-btn" href="simulator.html">Simulator</a>
      <a class="nav-btn" href="about.html">About</a>
    </nav>
  </header>

  <div class="editor-layout">

    <!-- Sidebar overlay (mobile) -->
    <div class="editor-sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar: item list -->
    <aside class="editor-sidebar" id="editorSidebar">
      <div class="editor-sidebar-header">
        <span>Items</span>
        <button class="add-btn" id="addItemBtn" style="font-size:10px;padding:3px 7px">+ New</button>
      </div>
      <div style="padding:6px 8px;border-bottom:1px solid var(--border)">
        <input type="text" id="sidebarSearch" placeholder="Filter items…"
          style="width:100%;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;outline:none;font-family:inherit">
      </div>
      <div class="editor-item-list" id="editorItemList"></div>
    </aside>

    <!-- Main editing area -->
    <main class="editor-main" id="editorMain">
      <button class="sidebar-toggle-btn" id="sidebarToggle">☰ Items</button>
      <div class="empty-state" id="emptyState">
        <h3>Select an item to edit</h3>
        <p>Choose from the list on the left, or create a new item.</p>
      </div>
    </main>

  </div>

</div>

<div id="tooltip"></div>

<script src="js/items-data.js"></script>
<script src="js/versions.js"></script>
<script src="js/suggestions-data.js"></script>
<script src="js/community-versions.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
