<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Tree — Changelog</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar-title">⬡ Item Tree</span>
    <div class="version-picker" id="versionPicker"></div>
    <div class="topbar-spacer"></div>
    <nav class="topbar-nav">
      <a class="nav-btn" href="index.html">Visualizer</a>
      <a class="nav-btn" href="editor.html">Editor</a>
      <a class="nav-btn active" href="changelog.html">Changelog</a>
    </nav>
  </header>

  <div class="canvas-wrapper" style="display:flex;flex-direction:column">
    <div class="changelog-layout">

      <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">Changelog</h2>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:18px">
        Compare any two versions — including Base — to see exactly what changed.
      </p>

      <!-- Controls -->
      <div class="changelog-controls">
        <label>From:</label>
        <select id="fromSelect"></select>
        <label style="margin-left:6px">→ To:</label>
        <select id="toSelect"></select>
        <button class="btn-primary" id="diffBtn" style="margin-left:8px">Generate</button>
        <button class="btn-secondary" id="exportBtn">Export .txt</button>
      </div>

      <!-- Output -->
      <div id="changelogOutput">
        <div class="empty-state">
          <h3>No diff yet</h3>
          <p>Select two versions above and click Generate.</p>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="js/items-data.js"></script>
<script src="js/versions.js"></script>
<script src="js/suggestions-data.js"></script>
<script src="js/changelog.js"></script>
</body>
</html>
